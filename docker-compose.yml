version: '3.8'

services:
  # PHP 서비스
  php:
    image: php:7.4-cli
    container_name: dw-church-php
    volumes:
      - .:/app
    working_dir: /app
    command: tail -f /dev/null
    depends_on:
      - mysql
    environment:
      - WP_TESTS_DIR=/tmp/wordpress-tests-lib
      - WP_CORE_DIR=/tmp/wordpress
    networks:
      - dw-church-network

  # MySQL 서비스
  mysql:
    image: mysql:5.7
    container_name: dw-church-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress_test
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dw-church-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

networks:
  dw-church-network:
    driver: bridge

