name: Create Release with Correct Folder Name

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Extract version from plugin file
      id: version
      run: |
        VERSION=$(grep "Version:" dasom-church-management.php | sed 's/.*Version: *//' | tr -d ' ')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"
        
    - name: Create plugin directory
      run: |
        mkdir -p "DW Church"
        
    - name: Copy plugin files
      run: |
        # Clean up any existing DW Church folder
        rm -rf "DW Church" || true
        
        # Create fresh DW Church directory
        mkdir -p "DW Church"
        
        # Remove all ZIP files from the source directory first
        find . -name "*.zip" -type f -delete
        
        # Copy files directly to DW Church folder (not into subfolder)
        rsync -av --exclude='.git' \
                  --exclude='.github' \
                  --exclude='.gitignore' \
                  --exclude='.gitattributes' \
                  --exclude='.vscode' \
                  --exclude='.idea' \
                  --exclude='.DS_Store' \
                  --exclude='node_modules' \
                  --exclude='vendor' \
                  --exclude='tests' \
                  --exclude='tmp' \
                  --exclude='build' \
                  --exclude='dist' \
                  --exclude='bin' \
                  --exclude='composer.json' \
                  --exclude='composer.lock' \
                  --exclude='package.json' \
                  --exclude='package-lock.json' \
                  --exclude='phpunit.xml' \
                  --exclude='phpunit.xml.dist' \
                  --exclude='.phpunit.result.cache' \
                  --exclude='docker-compose.yml' \
                  --exclude='build.sh' \
                  --exclude='build.ps1' \
                  --exclude='*.ps1' \
                  --exclude='*.log' \
                  --exclude='README.md' \
                  --exclude='CONTRIBUTING.md' \
                  --exclude='SETUP-DEVELOPMENT.md' \
                  --exclude='README-TESTING.md' \
                  --exclude='WORDPRESS-URL-FIX.md' \
                  --exclude='ELEMENTOR-CACHE-CLEAR-GUIDE.md' \
                  --exclude='MIGRATION-GUIDE.md' \
                  --exclude='WORDPRESS-PLUGIN-AUTO-UPDATE-GUIDE.md' \
                  --exclude='check-github-status.ps1' \
                  --exclude='check-widget-version.php' \
                  --exclude='clear-elementor-cache.php' \
                  --exclude='debug-banner-meta.php' \
                  --exclude='force-reload-widgets.php' \
                  --exclude='run-tests.ps1' \
                  --exclude='verify-tests.ps1' \
                  --exclude='DW Church' \
                  --exclude='dasomweb-dasom-church-management-system' \
                  --exclude='temp-extract' \
                  . "DW Church/"
                  
    - name: Create ZIP file
      run: |
        zip -r "DW-Church-Management-System-${{ steps.version.outputs.version }}.zip" "DW Church/"
        
    - name: Verify ZIP contents
      run: |
        echo "ZIP file contents:"
        unzip -l "DW-Church-Management-System-${{ steps.version.outputs.version }}.zip"
        echo ""
        echo "Folder name verification:"
        rm -rf "DW Church" || true
        unzip -q "DW-Church-Management-System-${{ steps.version.outputs.version }}.zip"
        ls -la
        echo "Folder name: $(ls -1 | head -1)"
        
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          ## Release ${{ github.ref_name }}
          
          ### Changes
          - Fix DW Single Sermon mobile layout: 날짜 → 설교제목 → 성경구절 → 설교자
          - Right alignment for all text elements
          - Remove separators (||)
          - Correct folder name: DW Church
          
          ### Download
          Download the ZIP file below and extract it to your WordPress plugins directory.
        files: |
          DW-Church-Management-System-${{ steps.version.outputs.version }}.zip
        draft: false
        prerelease: false
