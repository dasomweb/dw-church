name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.0'
        
    - name: Install dependencies
      run: |
        composer install --no-dev --optimize-autoloader
        
    - name: Create plugin directory
      run: |
        mkdir -p "DW Church"
        
    - name: Copy plugin files
      run: |
        # Copy all files except excluded ones
        rsync -av --exclude='.git' \
          --exclude='.github' \
          --exclude='node_modules' \
          --exclude='*.zip' \
          --exclude='*.log' \
          --exclude='composer.json' \
          --exclude='composer.lock' \
          --exclude='package.json' \
          --exclude='package-lock.json' \
          --exclude='.gitignore' \
          --exclude='README.md' \
          --exclude='CHANGELOG.md' \
          --exclude='test-*' \
          --exclude='temp-*' \
          --exclude='build.ps1' \
          --exclude='.DS_Store' \
          --exclude='Thumbs.db' \
          . "DW Church/"
          
    - name: Clean up ZIP files
      run: |
        find "DW Church" -name "*.zip" -type f -delete
        
    - name: Verify directory structure
      run: |
        echo "Plugin directory contents:"
        ls -la "DW Church/"
        echo "Main plugin file:"
        ls -la "DW Church/dasom-church-management.php"
        
    - name: Create ZIP package
      run: |
        cd "DW Church"
        zip -r "../DW-Church-Management-System.zip" .
        cd ..
        
    - name: Verify ZIP contents
      run: |
        unzip -l DW-Church-Management-System.zip | head -20
        echo "ZIP file size: $(du -h DW-Church-Management-System.zip)"
        
    - name: Extract version from tag
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Release version: $VERSION"
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: DW-Church-Management-System.zip
        name: Release v${{ env.VERSION }}
        tag_name: ${{ github.ref_name }}
        body: |
          ## DW Church Management System v${{ env.VERSION }}
          
          ### Features
          - Complete church management system
          - Bulletins, sermons, columns, and photo albums
          - Modern security practices
          - Elementor widget support
          - Auto-update support
          
          ### Installation
          1. Download the ZIP file
          2. Upload to WordPress admin > Plugins > Add New > Upload Plugin
          3. Activate the plugin
          
          ### Requirements
          - WordPress 6.0 or higher
          - PHP 8.0 or higher
          
          ### Changelog
          See the [changelog](https://github.com/dasomweb/dasom-church-management-system/blob/main/CHANGELOG.md) for detailed changes.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
