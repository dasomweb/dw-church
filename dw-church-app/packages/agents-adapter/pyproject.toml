[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dw-church-agents-adapter"
version = "0.1.0"
description = "BlockAdapter implementation for True Light — bridges DW-AI agents to apps/server (Fastify) via internal HTTP."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "UNLICENSED" }
authors = [{ name = "DasomWeb" }]

dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "respx>=0.21.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dw_church_adapter"]

# Bundle the block registry JSON so production installs are self-
# contained. The Dockerfile copies packages/blocks/src/registry.json
# into src/dw_church_adapter/registry.json before `pip install` runs;
# this force-include line ensures hatch picks the file up into the
# wheel even though it isn't a .py source.
[tool.hatch.build.targets.wheel.force-include]
"src/dw_church_adapter/registry.json" = "dw_church_adapter/registry.json"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
