name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dw-church-app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: dw-church-app
      - run: pnpm lint
        working-directory: dw-church-app
      - run: pnpm typecheck
        working-directory: dw-church-app
      - run: cd apps/server && npx prisma generate && pnpm test
        working-directory: dw-church-app

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dw-church-app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: dw-church-app
      - run: pnpm build
        working-directory: dw-church-app
