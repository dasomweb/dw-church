# api-server service config.
# Railway service "Root Directory" must be set to `dw-church-app`, so Railway
# reads THIS file and builds with the dw-church-app/ subtree as the Docker
# build context. dw-church-app/Dockerfile.server is the maintained server
# image (COPY paths are relative to dw-church-app, no `dw-church-app/` prefix).
# The old repo-root Dockerfile.server + root railway.toml (repo-root context,
# prefixed COPYs) were removed — they had drifted out of sync and broke on a
# missing theme-sets package.json under the repo-root build context.
[build]
dockerfilePath = "Dockerfile.server"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
