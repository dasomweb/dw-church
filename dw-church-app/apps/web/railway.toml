# Railway config for Next.js web app
# Deploy: railway up --service web

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
# Build from the monorepo root so Dockerfile has access to workspace packages

[deploy]
startCommand = "node apps/web/server.js"
# Use /api/health (NOT "/"): the tenant middleware treats any non-platform Host
# — including Railway's internal healthcheck Host — as a custom domain and 404s
# unknown ones, so "/" fails the healthcheck. /api/health is excluded from the
# middleware matcher and always returns 200 once the container is up.
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Custom domains configured in Railway dashboard:
#   - truelight.app (root)
#   - *.truelight.app (wildcard — tenant subdomains)
